# FoundryOS — Mission Control (foundryos.com)
# Monorepo: install from root, build platform workspace
[build]
  command = "npm ci && npm run build:platform"
  publish = "apps/platform/.next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[context.production]
  environment = { NODE_ENV = "production" }

[context.deploy-preview]
  environment = { NODE_ENV = "staging" }

[context.branch-deploy]
  environment = { NODE_ENV = "staging" }

# Admin + site-engine: separate Netlify sites (future)
